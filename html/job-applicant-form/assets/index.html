    <fieldset>
        <legend>Education</legend>
        <div>
            <input type="button" value="+" data-action="add" data-table="education" id="education">
            <input type="button" value="-" data-action="remove" data-table="education">
            <table data-table="education">
                <thead>
                    <th>Course</th>
                    <th>Passing Year</th>
                    <th>University/Board</th>
                    <th>Result</th>
                </thead>
                <tbody>
                    <tr class="prototype-row">
                        <td><input type="text"></td>
                        <td><input type="text"></td>
                        <td><input type="text"></td>
                        <td><input type="text"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </fieldset>
    <fieldset>
        <legend>Work Experience</legend>
        <input type="button" value="+" onclick="addRow()" data-table="experience" id="experience">
        <input type="button" value="-" onclick="removeRow()" data-table="experience">
        <table data-table="experience">
            <thead>
                <tr>
                    <th>Company</th>
                    <th>From Date</th>
                    <th>To Date</th>
                    <th>Annual Package</th>
                    <th>Reason to leave</th>
                    <th>Ref. Contact Number</th>
                    <th>Ref. Contact Name</th>
                </tr>
            </thead>
            <tbody>
                <tr class="prototype-row">
                    <td><input type="text" name="Company"></td>
                    <td><input type="date" name="from"></td>
                    <td><input type="date" name="to"></td>
                    <td><input type="text" name="package"></td>
                    <td><input type="text" name="reason-to-leave"></td>
                    <td><input type="text" name="ref-contact-number"></td>
                    <td><input type="text" name="ref-contact-name"></td>
                </tr>
            </tbody>
        </table>
    </fieldset>
