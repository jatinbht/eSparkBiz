<!DOCTYPE html>
<html>
<head>
    <title>POST Form Example</title>
</head>
<body>
    <h1>Login Form</h1>
    <form action="/index" method="POST">
        <label>Username: <input type="text" name="username"></label><br>
        <label>Password: <input type="password" name="password"></label><br>
        <button type="submit">Login</button>
    </form>
</body>
</html>
