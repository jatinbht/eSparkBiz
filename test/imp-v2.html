<body>
    <form id="form">
        <input name="username" required data-minlength="3" />
        <input name="password" required data-minlength="6" data-password />
        <input name="confirmPassword" required data-match="password" />
        <button type="submit">Submit</button>
    </form>

    <script>
        const form = document.getElementById('form');

        form.addEventListener('input', validateField);
        form.addEventListener('submit', handleSubmit);

        function getError(field) {
            const min = Number(field.dataset.minlength);    
            const match = field.dataset.match;

            if (min && field.value.length < min) {
                return `Minimum ${min} characters required`;
            }

            if (match) {
                const other = form.elements[match];
                if (field.value !== other.value) {
                    return 'Fields do not match';
                }
            }
            return null;
        }

        function validateField(e) {
            const field = e.target;
            field.setCustomValidity(getError(field) ?? '');
        }

        function handleSubmit(e) {
            if (!form.reportValidity()) {
                e.preventDefault();
                form.querySelector(':invalid').focus();
            }
        }
    </script>
</body>
