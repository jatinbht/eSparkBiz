<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
    <form action="#">
        First Name: <input type="text" name="first-name" required >
        Last Name: <input type="text" name="last-name" required >
        Designation: <input type="text" name="designation" required >
        Address 1: <input type="text" name="address1" required >
        Address 2: <input type="text" name="address2" >
        Email: <input type="email" name="email" required >
        Phone Number: <input type="tel" name="phone" required >
        City: <input type="text" name="city" required >
        State:
        <select name="state" required >
            <option value="" disabled selected >Select state</option>
            <option value="gujarat">Gujarat</option>
            <option value="rajasthan">Rajasthan</option>
        </select>
        <fieldset>
            <legend>Gender</legend>
            <input type="radio" name="gender" value="male" required> Male
            <input type="radio" name="gender" value="female"> Female
        </fieldset>
        Zip Code: <input type="text" name="zip">
        Relationship Status:
        <select name="relationship-status" >
            <option value="single">Single</option>
            <option value="married">Married</option>
        </select>
        Date of Birth: <input type="date" name="dob" >
        
        <input type="submit" value="Submit">
    </form>
    <script src="./validator.js"></script>
</body>
</html>
